<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Study Hub</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="icon">🛡️</span>
                    <h1>SOC Study Hub</h1>
                </div>
                <button id="mobile-menu-btn" class="mobile-menu-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
            </div>
            
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Cerca argomenti..." aria-label="Cerca nei documenti">
                <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </div>

            <nav class="nav-menu">
                <p class="nav-title">Documenti di Studio</p>
                <ul id="doc-list" class="doc-list">
                    <!-- Populated by JS -->
                </ul>
                <div class="progress-container">
                    <p class="progress-title">Progresso Studio</p>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="progress-bar"></div>
                    </div>
                    <p class="progress-text"><span id="progress-text">0</span>% Completato</p>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <h2 id="current-doc-title">Seleziona un argomento</h2>
                <div class="header-actions">
                    <button id="mark-done-btn" class="btn btn-outline" style="display: none;">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        Segna come letto
                    </button>
                    <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme">
                        <svg class="sun-icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    </button>
                </div>
            </header>
            
            <div id="content-area" class="markdown-body">
                <div class="welcome-screen">
                    <span class="welcome-icon">👋</span>
                    <h2>Benvenuto nel tuo SOC Study Hub</h2>
                    <p>Usa il menu a sinistra per navigare tra i materiali di studio per il tuo colloquio.</p>
                    <div class="quick-stats">
                        <div class="stat-card">
                            <h3>11</h3>
                            <p>Documenti</p>
                        </div>
                        <div class="stat-card">
                            <h3>100+</h3>
                            <p>Domande Colloquio</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <button id="back-to-top" class="back-to-top" aria-label="Torna su">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
            </button>
        </main>
    </div>

    <!-- Custom JS -->
    <script src="app.js"></script>
</body>
</html>
